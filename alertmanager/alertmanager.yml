global:
  resolve_timeout: 5m

route:
  receiver: "teams-notifications"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: "teams-notifications"
      repeat_interval: 1h

receivers:
  - name: "teams-notifications"
    webhook_configs:
      - url: "${TEAMS_WEBHOOK_URL}"
        send_resolved: true
